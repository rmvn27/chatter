version: '3'

services:
  db:
    image: postgres:alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: chatter
    volumes:
      - "data-db:/var/lib/postgresql/data"
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    volumes:
      # use to persist cached data
      - "data-cache:/data"
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    # no volumes since nats doesnt store any state
    ports:
      - "4222:4222"

volumes:
  data-db:

  data-cache:
